      "pull request",
      "changelog",
      "git",
      "stage",
      "staging"
    ]
  },
  "skills": [
    {
      "id": "platform.git_workflow_design",
      "path": "skills/git-workflow-design/SKILL.md"
    },
    {
      "id": "platform.using_workflow_kit",
      "path": "skills/using-workflow-kit/SKILL.md"
    },
    {
      "id": "platform.incident_response",
      "path": "skills/incident-response/SKILL.md"
