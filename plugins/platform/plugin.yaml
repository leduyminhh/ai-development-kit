{
  "apiVersion": "ai-engineering.dev/v1alpha1",
  "kind": "AiIdePlugin",
  "metadata": {
    "id": "platform",
    "name": "Platform Engineering",
    "version": "1.0.0",
    "description": "Delivery, deployment, observability, incident response, and workflow operations."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported",
      "antigravity": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": [
      "quality",
      "security"
    ]
  },
  "assets": {
    "skills": [
      "git-workflow-design",
      "using-workflow-kit",
      "incident-response"
