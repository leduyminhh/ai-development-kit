{
  "apiVersion": "ai-engineering.dev/v1alpha1",
  "kind": "AiIdePlugin",
  "metadata": {
    "id": "knowledge",
    "name": "Knowledge Engineering",
    "version": "1.0.0",
    "description": "Documentation, README, runbook, API docs, onboarding, and changelog workflows."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": [
      "architecture"
    ]
  },
  "assets": {
    "skills": [
      "doc-write",
      "diagram-generate",
      "youtube-transcript"
    ],
    "agents": [
      "doc-write",
      "diagram-generate"
    ],
    "commands": [
      "commands/write-technical-doc.md"
    ],
    "hooks": [],
    "rules": "none",
    "templates": "none",
    "workflows": "none",
    "schemas": "none"
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  },
  "id": "knowledge",
  "name": "Knowledge Engineering",
  "version": "1.0.0",
  "description": "Documentation, README, runbook, API docs, onboarding, and changelog workflows.",
  "category": "ai-ide-plugin",
  "triggers": {
    "keywords": [
      "documentation",
      "readme",
      "runbook",
      "api docs",
      "onboarding",
      "changelog"
    ]
  },
  "skills": [
    {
      "id": "knowledge.youtube_transcript",
      "path": "skills/youtube-transcript/SKILL.md"
    }
  ],
  "depends_on": {
    "plugins": []
  }
}
