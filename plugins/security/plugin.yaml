{
  "apiVersion": "ai-engineering.dev/v1alpha1",
  "kind": "AiIdePlugin",
  "metadata": {
    "id": "security",
    "name": "Security Engineering",
    "version": "1.0.0",
    "description": "OWASP, CWE, secrets, threat modeling, dependency, and container security."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported",
      "antigravity": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": [
      "quality"
    ]
  },
  "assets": {
    "skills": [
      "security-code-review"
    ],
    "agents": [
      "security-code-review"
    ],
    "commands": [
      "commands/review-security.md"
    ],
    "hooks": [
      "project-audit"
    ],
    "rules": "none",
    "templates": "none",
    "workflows": [
      "workflows/security-audit-pipeline.yaml"
    ],
    "schemas": [
      "schemas/security-review-context.schema.json"
    ]
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  },
  "category": "ai-ide-plugin",
  "triggers": {
    "keywords": [
      "security",
      "owasp",
      "cwe",
      "secrets",
      "threat model"
    ]
  },
  "skills": [
    {
      "id": "security.security_code_review",
      "path": "skills/security-code-review/SKILL.md"
    }
  ],
  "depends_on": {
    "plugins": []
  },
  "displayName": "Security Engineering",
  "developerName": "AI Engineering Platform"
}
