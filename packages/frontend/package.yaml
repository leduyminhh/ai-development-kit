{
  "apiVersion": "aiep.dev/v1alpha1",
  "kind": "Plugin",
  "metadata": {
    "id": "frontend",
    "name": "Frontend Engineering",
    "version": "1.0.0",
    "description": "React implementation, accessibility, API integration, performance review, and testing."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": ["security", "testing"]
  },
  "assets": {
    "skills": ["react-code-generate", "test-automation-validate"],
    "agents": ["react-code-generate", "test-automation-validate"],
    "commands": ["implement-frontend"],
    "hooks": ["project-audit"]
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  }
}
