{
  "apiVersion": "aiep.dev/v1alpha1",
  "kind": "Plugin",
  "metadata": {
    "id": "documentation",
    "name": "Documentation Engineering",
    "version": "1.0.0",
    "description": "Technical documentation, diagrams, architecture notes, flows, and implementation handoff."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": []
  },
  "assets": {
    "skills": ["doc-write", "diagram-generate"],
    "agents": ["doc-write", "diagram-generate"],
    "commands": ["write-technical-doc"],
    "hooks": []
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  }
}
