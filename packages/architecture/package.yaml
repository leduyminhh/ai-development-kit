{
  "apiVersion": "ai-engineering.dev/v1alpha1",
  "kind": "Plugin",
  "metadata": {
    "id": "architecture",
    "name": "Architecture Engineering",
    "version": "1.0.0",
    "description": "Architecture analysis, Onion Architecture, shared module design, and pattern selection."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported"
    }
  },
  "dependencies": {
    "required": [],
    "optional": []
  },
  "assets": {
    "skills": ["java-analyze", "architecture-onion-design", "code-shared-design", "code-design-pattern"],
    "agents": ["java-analyze", "code-design-pattern"],
    "commands": ["review-architecture"],
    "hooks": ["project-audit"]
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  }
}
