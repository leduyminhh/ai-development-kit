{
  "apiVersion": "aiep.dev/v1alpha1",
  "kind": "Plugin",
  "metadata": {
    "id": "backend",
    "name": "Backend Engineering",
    "version": "1.0.0",
    "description": "Backend architecture, implementation review, shared contracts, and automated verification."
  },
  "compatibility": {
    "platform": ">=1.0.0 <2.0.0",
    "providers": {
      "codex": "supported",
      "claude": "supported",
      "cursor": "supported"
    }
  },
  "dependencies": {
    "required": ["architecture"],
    "optional": ["security"]
  },
  "assets": {
    "skills": ["java-analyze", "code-shared-design", "test-automation-validate"],
    "agents": ["java-analyze", "test-automation-validate"],
    "commands": ["review-backend"],
    "hooks": ["project-audit"]
  },
  "install": {
    "defaultScope": "project",
    "supportsCopy": true,
    "supportsLink": true
  }
}
