# Workflow registry for ai-development-kit.
# Concrete workflows are intentionally not registered yet.

schema_version = 1
workflows_root = "workflows"

[adapter_roots]
codex = ".codex-plugin"
claude_code = ".claude-plugin"
cursor = ".cursor-plugin"

# Future workflow entries should use this shape:
