# Test map groups commands by selection policy.
# When adding a new test file, register it here in exactly one group:
# - test.always: final safety gates that always run in selected verification.
# - test.core.<name>: triggered by changed paths or low-level workflow components.
# - test.skill.<name>: triggered by activated skill, agent, or mapped paths.

[test.runner]
parallel = true
finalValidator = "powershell -ExecutionPolicy Bypass -File skills/codex-best-practice-validator/scripts/validate-codex-structure.ps1 -Root ."

[test.always.structure]
description = "Final Codex structure validation"
commands = [
  "powershell -ExecutionPolicy Bypass -File skills/codex-best-practice-validator/scripts/validate-codex-structure.ps1 -Root ."
]

[test.core.pwsh-lib]
paths = [
  "scripts/lib"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-codex-pwsh-lib.ps1"
]

[test.core.output-file]
paths = [
  "scripts/resolve-output-file.ps1",
  "scripts/lib/codex-output-file.ps1",
  ".codex/config.toml",
  "skills/diagram-w"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-resolve-output-file.ps1"
]

[test.core.audit-hook]
paths = [
  ".codex/hooks/agent-execution-audit.ps1",
  ".codex/config.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File .codex/hooks/test-agent-execution-audit.ps1"
]

[test.core.audited-runner]
paths = [
  "scripts/invoke-agent-audited.ps1",
  ".codex/hooks/agent-execution-audit.ps1",
  ".codex/agents",
  ".codex/config.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-invoke-agent-audited.ps1"
]

[test.core.validator]
paths = [
  "skills/codex-best-practice-validator",
  ".codex/config.toml",
  ".codex/test-map.toml",
  "scripts/resolve-test-plan.ps1",
  "scripts/test-selected.ps1",
  "scripts/test-test-map.ps1",
  "AGENTS.md"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-test-map.ps1",
  "powershell -ExecutionPolicy Bypass -File skills/codex-best-practice-validator/scripts/test-validate-codex-structure.ps1"
]

[test.core.skill-feedback]
paths = [
  "scripts/add_skill_feedback.py",
  "scripts/test-add-skill-feedback.ps1",
  "scripts/lib/codex_config.py",
  ".codex/config.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-add-skill-feedback.ps1"
]

[test.core.skill-upgrade-cycle]
paths = [
  "scripts/run_skill_upgrade_cycle.py",
  "scripts/apply_skill_upgrade_proposal.py",
  "scripts/write_skill_upgrade_proposal.py",
  "scripts/test-run-skill-upgrade-cycle.ps1",
  "scripts/test-apply-skill-upgrade-proposal.ps1",
  ".codex/config.toml",
  ".codex/agents/skill-maintenance-review.toml",
  "skills/skill-maintenance-review",
  "skills/naming-rule-validate"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-run-skill-upgrade-cycle.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-apply-skill-upgrade-proposal.ps1",
  "powershell -ExecutionPolicy Bypass -File skills/naming-rule-validate/scripts/test-naming-rule-validate.ps1"
]

[test.skill.automation-testing]
agents = ["automation-testing"]
skills = ["automation-testing"]
paths = [
  "skills/automation-testing",
  ".codex/agents/automation-testing.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File skills/automation-testing/scripts/test-automation-testing-strategy.ps1"
]

[test.skill.onion-architecture]
agents = ["java-architect"]
skills = ["onion-architecture", "shared-module-architecture"]
paths = [
  "skills/onion-architecture",
  "skills/shared-module-architecture",
  "skills/java-architect/SKILL.md",
  ".codex/agents/java-architect.toml",
  "scripts/test-architecture-skills.ps1"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-architecture-skills.ps1"
]

[test.skill.diagram-w]
agents = ["diagram-w"]
skills = ["diagram-w"]
paths = [
  "skills/diagram-w",
  ".codex/agents/diagram-w.toml",
  "scripts/resolve-output-file.ps1"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-resolve-output-file.ps1"
]
