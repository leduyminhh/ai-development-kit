# Test map groups commands by selection policy.
# When adding a new test file, register it here in exactly one group:
# - test.always: final safety gates that always run in selected verification.
# - test.core.<name>: triggered by changed paths or low-level workflow components.

[test.runner]
parallel = true
finalValidator = "powershell -ExecutionPolicy Bypass -File .agents/skills/codex-structure-validate/scripts/validate-codex-structure.ps1 -Root ."

[test.always.structure]
description = "Final Codex structure validation"
commands = [
  "powershell -ExecutionPolicy Bypass -File .agents/skills/codex-structure-validate/scripts/validate-codex-structure.ps1 -Root ."
]

[test.core.pwsh-lib]
paths = [
  "scripts/lib"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-codex-pwsh-lib.ps1"
]

[test.core.output-file]
paths = [
  "scripts/resolve-output-file.ps1",
  "scripts/lib/codex-output-file.ps1",
  ".codex/config.toml",
  ".agents/skills/diagram-generate"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-resolve-output-file.ps1"
]

[test.core.audit-hook]
paths = [
  ".codex/hooks/write-agent-audit.ps1",
  ".codex/config.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File .codex/hooks/test-write-agent-audit.ps1"
]

[test.core.naming-rule]
description = "Validate naming convention for new or changed Codex artifacts"
paths = [
  ".codex/agents",
  ".agents/skills",
  ".codex/hooks",
  "scripts"
]
passChangedFiles = true
commands = [
  "powershell -ExecutionPolicy Bypass -File .agents/skills/naming-rule-validate/scripts/validate-naming-rule.ps1 -Root ."
]

[test.core.naming-rule-suite]
paths = [
  ".agents/skills/naming-rule-validate/scripts/validate-naming-rule.ps1",
  ".agents/skills/naming-rule-validate/scripts/test-naming-rule-validate.ps1",
  "scripts/resolve-test-plan.ps1",
  ".codex/test-map.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File .agents/skills/naming-rule-validate/scripts/test-naming-rule-validate.ps1"
]

[test.core.audited-runner]
paths = [
  "scripts/invoke-agent-audited.ps1",
  ".codex/hooks/write-agent-audit.ps1",
  ".codex/agents",
  ".codex/config.toml"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-invoke-agent-audited.ps1"
]

[test.core.validator]
paths = [
  ".agents/skills/codex-structure-validate",
  ".codex/config.toml",
  ".codex/test-map.toml",
  "scripts/resolve-test-plan.ps1",
  "scripts/test-selected.ps1",
  "scripts/test-test-map.ps1",
  "AGENTS.md"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-test-map.ps1",
  "powershell -ExecutionPolicy Bypass -File .agents/skills/codex-structure-validate/scripts/test-validate-codex-structure.ps1"
]

[test.core.progressive-disclosure]
description = "Ensure top-level skills defer broad context to selector resources"
paths = [
  ".agents/skills/react-code-generate",
  ".agents/skills/diagram-generate",
  ".agents/skills/test-automation-validate",
  "scripts/test-progressive-disclosure.ps1"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-progressive-disclosure.ps1"
]

[test.core.readme-skill-catalog]
description = "Ensure README skill catalogs stay synchronized when skills change"
paths = [
  "README.md",
  ".agents/README.md",
  ".agents/skills",
  "scripts/test-readme-skill-catalog.ps1"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-readme-skill-catalog.ps1"
]
