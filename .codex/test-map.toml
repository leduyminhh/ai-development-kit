# Test map groups commands by selection policy.
# When adding a new test file, register it here in exactly one group:
# - test.always: final safety gates that always run in selected verification.
# - test.core.<name>: triggered by changed paths or low-level workflow components.
# - test.skill.<name>: triggered by activated skill, agent, or mapped paths.

[test.runner]
parallel = true
finalValidator = "powershell -ExecutionPolicy Bypass -File skills/codex-structure-validate/scripts/validate-codex-structure.ps1 -Root ."

[test.always.structure]
description = "Final Codex structure validation"
commands = [
  "powershell -ExecutionPolicy Bypass -File skills/codex-structure-validate/scripts/validate-codex-structure.ps1 -Root ."
]

[test.core.pwsh-lib]
paths = [
  "scripts/lib"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-codex-pwsh-lib.ps1"
]

[test.core.output-file]
paths = [
  "scripts/resolve-output-file.ps1",
  "scripts/lib/codex-output-file.ps1",
  ".codex/config.toml",
  "skills/diagram-generate"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/test-resolve-output-file.ps1"
]

[test.core.project-hook]
paths = [
  ".codex/hooks/log-agent-event.ps1",
  ".codex/hooks/lib",
  ".codex/config.toml",
  "scripts/hooks",
  "scripts/invoke-hook.ps1",
  "scripts/hook-doctor.ps1",
  "scripts/query-hook-audit.ps1",
  "scripts/view-hook-trace.ps1",
  "scripts/install-hooks.ps1",
  "scripts/hook-service.ps1",
  "scripts/test-hook-adapters.ps1",
  "scripts/test-hook-core.ps1",
  "scripts/test-hook-doctor.ps1",
  "scripts/test-hook-flow.ps1",
  "scripts/test-hook-query.ps1",
  "scripts/test-install-hooks.ps1",
  "scripts/test-hook-service.ps1"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File .codex/hooks/test-log-agent-event.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook-adapters.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook-core.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook-doctor.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook-flow.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-hook-query.ps1",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-install-hooks.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-hook-service.ps1"
]

[test.core.workflow]
paths = [
  ".codex/workflows",
  ".codex-plugin",
  ".claude-plugin",
  ".cursor-plugin",
  "adapters",
  "hooks/session-start",
  "hooks/run-hook.cmd",
  "scripts/validate-workflows.ps1",
  "scripts/test-workflow-bootstrap.ps1",
  "skills/using-workflow-kit"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/validate-workflows.ps1 -Root .",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-workflow-bootstrap.ps1"
]

[test.core.validator]
paths = [
  "skills/codex-structure-validate",
  ".codex/agent-metadata",
  ".codex/config.toml",
  ".codex/test-map.toml",
  ".codex/workflows",
  "scripts/validate-workflows.ps1",
  "scripts/test-workflow-bootstrap.ps1",
  "scripts/install-skill-link.ps1",
  "scripts/install.ps1",
  "scripts/skill-doctor.ps1",
  "scripts/test-install-skill-link.ps1",
  "scripts/test-skill-doctor.ps1",
  "scripts/test-skills-cli-compat.ps1",
  "scripts/resolve-test-plan.ps1",
  "scripts/test-selected.ps1",
  "scripts/test-test-map.ps1",
  "AGENTS.md",
  "README.md",
  "README_VI.md",
  "skills/SKILL_TEMPLATE.md"
]
commands = [
  "powershell -ExecutionPolicy Bypass -File scripts/validate-workflows.ps1 -Root .",
  "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/test-workflow-bootstrap.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-install-skill-link.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-skill-doctor.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-skills-cli-compat.ps1",
  "powershell -ExecutionPolicy Bypass -File scripts/test-test-map.ps1",
  "powershell -ExecutionPolicy Bypass -File skills/codex-structure-validate/scripts/test-validate-codex-structure.ps1"
]

