# Codex does not use the same SessionStart hook contract as Claude Code or Cursor.
# Install the using-workflow-kit skill and invoke it explicitly when a session needs
# workflow routing:
#
#   $using-workflow-kit

[workflow_kit.bootstrap]
skill = "using-workflow-kit"
registry = ".codex/workflows/registry.toml"
note = "Use this as a config/documentation snippet; do not assume SessionStart hook parity."
