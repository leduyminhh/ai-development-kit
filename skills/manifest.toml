# Explicit contract between repo skill assets, runtime registration, and external Codex discovery.

[repo_structure]
skills_root = "skills"
catalog = "skills/README.md"
manifest_version = 1

[repository]
github = "leduyminhh/ai-development-kit"

[runtime_registration]
config = ".codex/config.toml"
agents_root = ".codex/agents"

[external_discovery]
loader_root = "~/.codex/skills"
install_script = "scripts/install-skill-link.ps1"
link_name = "codex-workflow-kit"
linked_source = "skills"
notes = [
  "Repository structure does not register agents by itself.",
  "Agent runtime registration is controlled by .codex/config.toml and .codex/agents/*.toml.",
  "Codex external discovery requires linking or copying skills/ into the user's Codex skills root."
]

[skills_cli]
supported = true
help_command = "npx skills --help"
list_command = "npx skills add . --list"
install_one_command = "npx skills add . --skill security-code-review --agent codex -y"
install_claude_code_global_command = "npx skills add . --skill security-code-review --agent claude-code -g -y --copy"
source_layout = "skills/<name>/SKILL.md"
allowed_default_skills = [
  "agent-operating-rules",
  "diagram-generate",
  "doc-write",
  "git-workflow-design",
  "security-code-review",
  "using-workflow-kit"
]
alias_commands = [
  "npx skills a . --skill security-code-review --agent codex -y",
  "npx skills ls --agent codex",
  "npx skills update security-code-review",
  "npx skills upgrade security-code-review",
  "npx skills rm security-code-review"
]

[skills_cli.target_paths]
codex = ".agents/skills"
cursor = ".agents/skills"
claude_code = ".claude/skills"
notes = [
  "The skills CLI discovers repository skills from the existing skills layout.",
  "Agents may list available skills, but default install commands must only install allowed_default_skills.",
  "Do not use --all for the default install flow.",
  "Do not store a bulk default install command; generate explicit --skill commands from allowed_default_skills when needed.",
  "Use --skill <name> to install a single skill from this multi-skill repository when the skill is in allowed_default_skills.",
  "Use --agent claude-code -g -y --copy when installing for Claude Code so SKILL.md is copied under ~/.claude/skills/<name>.",
  "Use --copy when the target agent should receive physical files instead of links."
]

